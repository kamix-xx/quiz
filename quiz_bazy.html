<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - SQL i NoSQL</title>
    <style>
        :root {
            --primary: #007AFF; /* iOS Blue */
            --primary-hover: #0056b3;
            --success: #34C759; /* iOS Green */
            --danger: #FF3B30; /* iOS Red */
            --bg: #F2F2F7;
            --card-bg: #FFFFFF;
            --text: #1C1C1E;
            --text-muted: #8E8E93;
            --option-bg: #FFFFFF;
            --option-border: #E5E5EA;
            --option-hover: #F2F2F7;
            --option-selected: #E5F1FF;
            --option-selected-border: #007AFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .quiz-container {
            background: var(--card-bg);
            max-width: 800px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            margin-top: 0;
            color: var(--text);
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .intro-text {
            font-size: 1.15em;
            color: var(--text-muted);
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .progress {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-bar-container {
            flex-grow: 1;
            background: var(--option-border);
            height: 8px;
            border-radius: 4px;
            margin-right: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-box {
            margin-bottom: 30px;
        }

        .question-type-badge {
            display: inline-block;
            background: #E5E5EA;
            color: #8E8E93;
            font-size: 0.75em;
            text-transform: uppercase;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .question {
            font-size: 1.3em;
            font-weight: 600;
            white-space: pre-wrap;
            line-height: 1.4;
            color: var(--text);
        }

        code {
            background: #F2F2F7;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            color: #D50000;
        }

        .option {
            display: flex;
            align-items: center;
            background: var(--option-bg);
            margin: 12px 0;
            padding: 16px 20px;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1.05em;
            border: 2px solid var(--option-border);
            line-height: 1.45;
            white-space: pre-wrap;
            color: var(--text);
        }

        .option:hover {
            background: var(--option-hover);
        }

        .option.selected {
            background: var(--option-selected);
            border-color: var(--option-selected-border);
        }

        /* States after checking answer */
        .option.correct-answer {
            background: #E8F5E9;
            border-color: var(--success);
            color: #1B5E20;
        }

        .option.wrong-answer {
            background: #FFEBEE;
            border-color: var(--danger);
            color: #B71C1C;
            opacity: 0.8;
        }

        .checkbox-indicator {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid #C7C7CC;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .option.selected .checkbox-indicator {
            background: var(--primary);
            border-color: var(--primary);
        }

        .option.selected .checkbox-indicator::after {
            content: "✓";
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .option.correct-answer .checkbox-indicator {
            background: var(--success);
            border-color: var(--success);
        }

        .option.correct-answer .checkbox-indicator::after {
            content: "✓";
            color: white;
        }

        .option.wrong-answer .checkbox-indicator {
            background: var(--danger);
            border-color: var(--danger);
        }

        .option.wrong-answer .checkbox-indicator::after {
            content: "✕";
            color: white;
        }

        .btn {
            display: block;
            width: 100%;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 18px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.15em;
            font-weight: 600;
            margin-top: 30px;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn:disabled {
            background: #D1D1D6;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 25px;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.05em;
            display: none;
            animation: fadeIn 0.3s ease;
            line-height: 1.5;
        }

        .feedback.correct {
            background: #E8F5E9;
            color: #1B5E20;
            display: block;
        }

        .feedback.incorrect {
            background: #FFEBEE;
            color: #B71C1C;
            display: block;
        }

        .explanation {
            margin-top: 10px;
            font-size: 0.9em;
            font-weight: normal;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            padding-top: 10px;
        }

        .score-container {
            text-align: center;
        }

        .score {
            font-size: 4em;
            font-weight: 800;
            color: var(--primary);
            margin: 20px 0;
            letter-spacing: -0.02em;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .quiz-container {
                padding: 25px 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .question {
                font-size: 1.15em;
            }

            .option {
                font-size: 1em;
                padding: 14px 16px;
            }

            .btn {
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
<div class="quiz-container" id="quiz-container">
    <div id="start-screen">
        <h1>Quiz: Bazy danych SQL i NoSQL</h1>
        <p class="intro-text">

            Z naszej puli <strong><span id="total-q-count"></span> pytań</strong> aplikacja losuje <strong>15
            zagadnień</strong> na każdą sesję.
            <br><br>
            <strong>Uwaga: Pytania mogą być wielokrotnego wyboru!</strong> Zaznacz wszystkie poprawne odpowiedzi i
            kliknij "Sprawdź".
        </p>
        <button class="btn" id="start-btn">Rozpocznij Quiz</button>
    </div>

    <div id="quiz-screen" class="hidden">
        <div class="progress">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <span id="progress-text">1 / 15</span>
        </div>

        <div class="question-box">
            <div class="question-type-badge" id="q-type-badge">Wielokrotny wybór</div>
            <div class="question" id="question-text"></div>
        </div>

        <div id="options-container"></div>

        <div id="feedback-message" class="feedback"></div>

        <button class="btn" id="check-btn" disabled>Zaznacz odpowiedź, aby sprawdzić</button>
        <button class="btn hidden" id="next-btn">Następne pytanie</button>
    </div>

    <div id="result-screen" class="hidden score-container">
        <h1>Koniec Quizu!</h1>
        <p class="intro-text">Oto Twój wynik z tej sesji:</p>
        <div class="score" id="score"></div>
        <button class="btn" id="restart-btn">Zagraj ponownie (nowe losowanie)</button>
    </div>
</div>

<script>
    const allQuestions = [
        {
            "question": "Polecenie CREATE USER user1 IDENTIFIED BY 'password' oznacza:",
            "options": [
                "Utworzenie użytkownika user1 dla hosta localhost",
                "Utworzenie użytkownika user1 dla hosta %",
                "Komenda jest błędna",
                "Utworzenie użytkownika user1 bez określonego hosta (host będzie miał wartość NULL)"
            ],
            "correct": [1],
            "explanation": "W systemach bazodanowych takich jak MySQL lub MariaDB, pominięcie jawnego określenia hosta podczas tworzenia użytkownika powoduje automatyczne przypisanie domyślnego znaku wieloznacznego '%', co zezwala na połączenia z dowolnego adresu IP."
        },
        {
            "question": "Spójność bazy danych:",
            "options": [
                "Jest ściśle powiązana z efektywnością przetwarzania danych",
                "Zapewnia poprawne odzwierciedlenie rzeczywistości",
                "Zapewnia się ją poprzez nadawanie ograniczeń integralnościowych",
                "Można ją uzyskać poprzez unikanie redundancji"
            ],
            "correct": [1, 2],
            "explanation": "Spójność (consistency) oznacza, że dane w bazie poprawnie i prawdziwie odzwierciedlają stan faktyczny. Głównym narzędziem do jej wymuszenia i utrzymania są więzy oraz ograniczenia integralnościowe (klucze główne, obce, reguły CHECK itp.)."
        },
        {
            "question": "Protokół ścisłego blokowania dwufazowego:",
            "options": [
                "Zapewnia spójność bazy danych",
                "Jest mechanizmem obsługującym transakcje",
                "Jest mechanizmem zapewniającym zabezpieczony dostęp do danych",
                "Jest mechanizmem uruchamianym w przypadku zakleszczeń transakcji"
            ],
            "correct": [0, 1],
            "explanation": "Protokół Strict 2PL to klasyczny mechanizm kontroli współbieżności transakcji (obsługujący transakcje), który poprzez blokowanie zasobów gwarantuje serializowalność harmonogramów, zapobiegając anomaliom i tym samym zapewniając spójność bazy danych."
        },
        {
            "question": "Wskaż zdanie (zdania) prawdziwe:",
            "options": [
                "Indeks stosuje się w celu poprawy wydajności bazy danych podczas operacji zapisu i wyszukiwania",
                "Indeks stosuje się w celu poprawy wydajności bazy danych podczas operacji zapisu",
                "Indeks stosuje się w celu poprawy wydajności bazy danych podczas wszystkich operacji bazodanowych",
                "Indeks stosuje się w celu poprawy wydajności bazy danych podczas wyszukiwania"
            ],
            "correct": [3],
            "explanation": "Indeksy są strukturami tworzonymi specjalnie w celu przyspieszenia wyszukiwania i odczytu danych (operacji SELECT). W przypadku operacji modyfikacji danych (INSERT, UPDATE, DELETE) indeksy zazwyczaj dodatkowo obciążają system, ponieważ każda zmiana wymaga przebudowania struktury indeksu."
        },
        {
            "question": "Zapytanie MATCH (n {name: 'Kim'}) RETURN n to przykład zapytania w:",
            "options": [
                "Języku T-SQL",
                "Języku Cypher",
                "Języku Redis query",
                "Języku CQL"
            ],
            "correct": [1],
            "explanation": "Składnia wykorzystująca słowa kluczowe MATCH oraz RETURN i nawiasy klamrowe do dopasowywania wzorców właściwości węzłów jest cechą charakterystyczną języka Cypher, używanego w grafowej bazie danych Neo4j."
        },
        {
            "question": "Protokół Weak Strict 2PL został wprowadzony aby:",
            "options": [
                "Zapewnić lepszą spójność danych niż w protokole Strict 2PL",
                "Zapewnić mniejszą liczbę zakleszczeń niż w protokole Strict 2PL",
                "Zapewnić szybszy dostęp do danych niż w protokole Strict 2PL",
                "Zapewnić szybsze zwalnianie wszystkich blokad niż w protokole Strict 2PL"
            ],
            "correct": [2],
            "explanation": "Wariant 'Weak Strict 2PL' pozwala na wcześniejsze zwalnianie blokad współdzielonych (odczytu) przed formalnym zatwierdzeniem lub wycofaniem transakcji (w odróżnieniu od Strict 2PL, gdzie wszystkie blokady trzymane są do końca). Zwiększa to poziom współbieżności i zapewnia innym transakcjom szybszy dostęp do odczytywanych danych."
        },
        {
            "question": "Wskaż stwierdzenie (stwierdzenia) prawdziwe (na podstawie przedstawionego diagramu z encją Order):",
            "options": [
                "Aby był to poprawny fragment relacyjnego modelu logicznego (konceptualnego), konieczne jest dodanie dodatkowej encji",
                "Możliwe jest bezpośrednie odwzorowanie tego modelu w relacyjny model fizyczny bazy danych",
                "Aby był to poprawny fragment relacyjnego modelu logicznego (konceptualnego), konieczne jest usunięcie „kółeczka” na połączeniu",
                "Jest to poprawny fragment relacyjnego modelu logicznego (konceptualnego)"
            ],
            "correct": [0],
            "explanation": "Zaprezentowany na diagramie symbol 'kurzej łapki' (crow's foot) oznacza relację, która z definicji musi łączyć ze sobą dwa obiekty. Linia relacji nie może kończyć się w pustym miejscu – do poprawności tego fragmentu modelu niezbędne jest dodanie drugiej, powiązanej encji."
        },

        {
            "question": "Co to są systemy zarządzania bazą danych (DBMS) w kontekście / W układ systemu baz danych (SBD) wchodzą:",
            "options": [
                "Systemy zarządzania bazą danych, schemat bazy danych",
                "Systemy zarządzania bazą danych, aplikacje, schemat bazy danych",
                "Systemy zarządzania bazą danych, aplikacje, schemat bazy danych, użytkownicy",
                "Systemy zarządzania bazą danych, aplikacje, schemat bazy danych, użytkownicy, dane"
            ],
            "correct": [3],
            "explanation": "W pełny skład systemu baz danych obok samego DBMS i schematu, wchodzą również dane, powiązane aplikacje dostępowe oraz sami użytkownicy[cite: 2, 6]."
        },
        {
            "question": "Która właściwość bazy danych jest niepożądana?",
            "options": [
                "Brak redundancji",
                "Zawisłość danych od programów",
                "Współdzielenie dostępu",
                "Współdzielenie danych"
            ],
            "correct": [1],
            "explanation": "Bazy danych projektuje się tak, aby zachować niezależność danych od aplikacji (programów), zatem zawisłość (uzależnienie) jest zjawiskiem wysoce niepożądanym[cite: 7, 9]."
        },
        {
            "question": "ACID jest skrótem od słów:",
            "options": [
                "Atomicity, Consistency, Isolation, Durability",
                "Analyse, Completely, Integrated, Data",
                "Asynchronous, Consistent, Isolated, Data",
                "Atomicity, Consistency, Independency, Durability"
            ],
            "correct": [0],
            "explanation": "ACID to zbiór właściwości gwarantujących poprawne przetwarzanie transakcji w bazach danych: Atomicity (Niepodzielność), Consistency (Spójność), Isolation (Izolacja), Durability (Trwałość)[cite: 12, 13]."
        },
        {
            "question": "Model implementacyjny:",
            "options": [
                "Jest sformalizowanym modelem realizacyjnym konkretnego schematu konceptualnego",
                "Określa sposób organizacji danych w pamięci zewnętrznej komputera",
                "Stanowi model konceptualny lub semantyczny problemu",
                "Określa metody odwzorowania spójności bazy danych"
            ],
            "correct": [0],
            "explanation": "Model implementacyjny określa sposób realizacji schematu na gruncie konkretnego oprogramowania (np. modelu relacyjnego), w przeciwieństwie do fizycznego, który tyczy się pamięci zewnętrznej[cite: 17, 18, 19]."
        },
        {
            "question": "Co nie należy do zadań systemu zarządzania bazą danych?",
            "options": [
                "Organizacja struktury bazy danych",
                "Przetwarzanie danych",
                "Brak poprawnej odpowiedzi",
                "Współbieżny dostęp do danych"
            ],
            "correct": [2],
            "explanation": "Zarówno organizacja struktury, przetwarzanie danych, jak i zarządzanie współbieżnym dostępem są podstawowymi zadaniami DBMS, więc żadna z tych opcji nie jest poprawnym wykluczeniem[cite: 23, 24, 25, 26, 27]."
        },
        {
            "question": "Jaka jest poprawna kolejność modelowania relacyjnej bazy danych?",
            "options": [
                "Skrypty SQL, zbieranie wymagań, fizyczny model danych, logiczny model danych",
                "Zbieranie wymagań, fizyczny model danych, logiczny model danych, skrypty SQL",
                "Zbieranie wymagań, logiczny model danych, skrypty SQL, fizyczny model danych",
                "Zbieranie wymagań, logiczny model danych, fizyczny model danych, skrypty SQL"
            ],
            "correct": [3],
            "explanation": "Proces projektowania rozpoczyna się od analizy wymagań, następnie tworzy się uniwersalny model logiczny, który przekładany jest na konkretny system (model fizyczny), by na koniec wygenerować skrypty SQL (np. DDL)[cite: 28, 30]."
        },
        {
            "question": "Klucz obcy to:",
            "options": [
                "Klucz zawsze oparty na jednym atrybucie",
                "Klucz jednoznacznie identyfikujący instancję encji",
                "Klucz zawsze oparty na zbiorze atrybutów",
                "Klucz wymagający zgodności typów"
            ],
            "correct": [3],
            "explanation": "Klucz obcy musi być zgodny pod względem typu danych z kluczem głównym encji rodzica, do której się odwołuje w ramach więzów referencyjnych[cite: 31, 35]."
        },
        {
            "question": "Relacja rekurencyjna:",
            "options": [
                "To relacja do tej samej encji",
                "To zależność pomiędzy izolacją i spójnością transakcji",
                "To relacja oparta wyłącznie na atrybucie prostym",
                "To relacja do innej encji"
            ],
            "correct": [0],
            "explanation": "Relacja rekurencyjna występuje, gdy klucz obcy w tabeli odwołuje się do klucza głównego w tej samej tabeli (np. powiązanie Pracownik - Przełożony, obaj są w tabeli Pracownicy)[cite: 36, 37]."
        },
        {
            "question": "Więzy integralności referencyjnej określają:",
            "options": [
                "Konieczność unikania wartości danych",
                "Warunki nałożone na klucze na poziomie pojedynczego atrybutu",
                "Warunki nałożone na dane na poziomie całej relacji",
                "Zachowanie się związku pomiędzy tabelami w przypadku zajścia różnych zdarzeń"
            ],
            "correct": [3],
            "explanation": "Więzy integralności referencyjnej sterują powiązaniami między krotkami (poprzez klucze obce) i pozwalają określić zasady reagowania (np. kaskadowanie, restrykcja) na modyfikację lub usunięcie powiązanych danych[cite: 41, 45]."
        },
        {
            "question": "Wielowersyjność w relacyjnych bazach danych polega na:",
            "options": [
                "Możliwości odczytywania danych zmienianych równocześnie przez inne transakcje w takiej postaci, w jakiej istniały w określonych momentach w przeszłości",
                "Przechowywaniu wszystkich zmian w bazie danych dla określonego dostępu",
                "Zakładaniu bloków na obiekty bazy danych",
                "Wykorzystaniu kopii zapasowych raz na jakiś czas"
            ],
            "correct": [0],
            "explanation": "Protokół MVCC (Multi-Version Concurrency Control) zapewnia spójny odczyt poprzez dostarczanie starych wersji danych transakcjom czytającym bez nakładania blokad wykluczających[cite: 46, 47, 48]."
        },
        {
            "question": "Jaki rodzaj blokad jest dopuszczany przy odczycie danych?",
            "options": [
                "Wyłączne i współdzielone",
                "Tylko wyłączne",
                "Tylko współdzielone",
                "Blokady nie są zakładane na tabeli szukał"
            ],
            "correct": [2],
            "explanation": "Operacje czystego odczytu standardowo ubiegają się o nałożenie blokad współdzielonych (Shared Locks), które pozwalają innym transakcjom również czytać, lecz uniemożliwiają modyfikacje[cite: 51, 53]."
        },
        {
            "question": "Anomalia transakcji polegająca na tym, że w trakcie jej wykonywania (przy powtórnym zapytaniu) pojawiają się nowe wiersze spełniające warunki zapytania, które nie były widoczne na początku, to:",
            "options": [
                "Brudny odczyt",
                "Utracona modyfikacja",
                "Fantom",
                "Niepowtarzalny odczyt"
            ],
            "correct": [2],
            "explanation": "Zjawisko odczytywania nowych krotek wygenerowanych w innej, współbieżnie zakończonej transakcji, to anomalia nazywana Fantomem (Phantom read)[cite: 55, 58]."
        },
        {
            "question": "Indeks, to:",

            "explanation": "Tryb Serializable stanowi z naukowego punktu widzenia barierę całkowicie najwyższej ochrony i symuluje ścisłe sekwencyjne jednowątkowe działanie dla transakcji, dając absolutne zapewnienie na wykluczenie standardowych anomalii jak zjawiska fantomów lub powtarzających się modyfikacji współbieżnych[cite: 228, 232]."
        },
        {
            "question": "Co nie jest sposobem na poprawę wydajności bazy danych?",
            "options": [
                "Analiza planów zapytań",
                "Stosowanie indeksów na tabelach, które są często aktualizowane lub wstawiane są nowe dane",
                "Przeprojektowanie schematu bazy danych",
                "Dobranie parametrów środowiskowych"
            ],
            "correct": [1],
            "explanation": "Budowanie i ciągłe wstawianie struktury indeksów mocno obciążonych w tabelach wymagających częstych wstawień rekordów lub cyklicznych aktualizacji znacząco ogranicza szybkość wprowadzania wprowadzanych DML, spowalniając zapis na dysk, jest więc wysoce kontrproduktywnym mechanizmem dążenia poprawy na płaszczyźnie wydajności ogólnej[cite: 233, 235]."
        }
    ]
    const totalQuestionsToAsk = 15;

    document.getElementById('total-q-count').innerText = allQuestions.length;

    let currentSessionQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let selectedOptions = new Set();
    let isQuestionChecked = false;

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex != 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    document.getElementById('start-btn').addEventListener('click', startQuiz);
    document.getElementById('check-btn').addEventListener('click', checkAnswer);
    document.getElementById('next-btn').addEventListener('click', nextQuestion);
    document.getElementById('restart-btn').addEventListener('click', startQuiz);

    function startQuiz() {
        score = 0;
        currentQuestionIndex = 0;

        let shuffledAll = shuffle([...allQuestions]);
        currentSessionQuestions = shuffledAll.slice(0, Math.min(totalQuestionsToAsk, allQuestions.length));

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');

        showQuestion();
    }

    function formatCode(text) {
        // Simple replacer for inline code ticks ` `
        return text.replace(/`([^`]+)`/g, '<code>$1</code>');
    }

    function showQuestion() {
        isQuestionChecked = false;
        selectedOptions.clear();

        document.getElementById('check-btn').classList.remove('hidden');
        document.getElementById('check-btn').disabled = true;
        document.getElementById('check-btn').innerText = "Sprawdź odpowiedź";
        document.getElementById('next-btn').classList.add('hidden');

        const feedbackEl = document.getElementById('feedback-message');
        feedbackEl.className = 'feedback';
        feedbackEl.innerHTML = '';

        const q = currentSessionQuestions[currentQuestionIndex];

        // Progress Bar
        const progressPercent = ((currentQuestionIndex) / currentSessionQuestions.length) * 100;
        document.getElementById('progress-bar').style.width = progressPercent + '%';
        document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${currentSessionQuestions.length}`;

        // Question Text & Badge
        document.getElementById('question-text').innerHTML = formatCode(q.question);
        const badge = document.getElementById('q-type-badge');
        badge.innerText = q.correct.length > 1 ? "Wielokrotny wybór" : "Jednokrotny wybór";

        // Render Options
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        let optionsWithIndex = q.options.map((opt, index) => ({text: opt, originalIndex: index}));
        optionsWithIndex = shuffle(optionsWithIndex); // Shuffle answers

        optionsWithIndex.forEach((optObj, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.dataset.originalIndex = optObj.originalIndex;

            const indicator = document.createElement('div');
            indicator.className = 'checkbox-indicator';
            optDiv.appendChild(indicator);

            const textSpan = document.createElement('span');
            textSpan.innerHTML = formatCode(optObj.text);
            optDiv.appendChild(textSpan);

            optDiv.addEventListener('click', function () {
                if (isQuestionChecked) return;

                if (selectedOptions.has(optObj.originalIndex)) {
                    selectedOptions.delete(optObj.originalIndex);
                    this.classList.remove('selected');
                } else {
                    // If it's a single choice, unselect others
                    if (q.correct.length === 1) {
                        selectedOptions.clear();
                        document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                    }
                    selectedOptions.add(optObj.originalIndex);
                    this.classList.add('selected');
                }

                document.getElementById('check-btn').disabled = selectedOptions.size === 0;
            });

            optionsContainer.appendChild(optDiv);
        });
    }

    function checkAnswer() {
        isQuestionChecked = true;
        document.getElementById('check-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');

        const q = currentSessionQuestions[currentQuestionIndex];
        const correctSet = new Set(q.correct);

        // Check if selected matches correct exactly
        let isPerfect = true;
        if (selectedOptions.size !== correctSet.size) {
            isPerfect = false;
        } else {
            for (let selected of selectedOptions) {
                if (!correctSet.has(selected)) {
                    isPerfect = false;
                    break;
                }
            }
        }

        // Style the options
        document.querySelectorAll('.option').forEach(optDiv => {
            const originalIndex = parseInt(optDiv.dataset.originalIndex);
            const isSelected = selectedOptions.has(originalIndex);
            const isActuallyCorrect = correctSet.has(originalIndex);

            optDiv.classList.remove('selected');

            if (isActuallyCorrect) {
                optDiv.classList.add('correct-answer');
            } else if (isSelected && !isActuallyCorrect) {
                optDiv.classList.add('wrong-answer');
            }
        });

        // Feedback Message
        const feedbackEl = document.getElementById('feedback-message');
        if (isPerfect) {
            score++;
            feedbackEl.innerHTML = '<strong>Świetnie! Poprawna odpowiedź.</strong>';
            feedbackEl.classList.add('correct');
        } else {
            let msg = '<strong>Niestety, odpowiedź nie jest w pełni poprawna.</strong><br>Prawidłowe opcje zostały zaznaczone na zielono.';
            feedbackEl.innerHTML = msg;
            feedbackEl.classList.add('incorrect');
        }

        // Add Explanation if exists
        if (q.explanation && q.explanation.trim() !== '') {
            const expDiv = document.createElement('div');
            expDiv.className = 'explanation';
            expDiv.innerHTML = formatCode(q.explanation);
            feedbackEl.appendChild(expDiv);
        }

        // Update button text if last question
        if (currentQuestionIndex === currentSessionQuestions.length - 1) {
            document.getElementById('next-btn').innerText = "Zakończ i pokaż wynik";
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < currentSessionQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');

        const percentage = Math.round((score / currentSessionQuestions.length) * 100);
        document.getElementById('score').innerText = `${score} / ${currentSessionQuestions.length}
(${percentage}%)`;
    }
</script>
</body>
</html>
